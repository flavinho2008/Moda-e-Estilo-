<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Moda & Estilo</title>

<style>
body {
    font-family: Arial;
    background-color: #f4f4f4;
    text-align: center;
}

.produtos {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.produto {
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 200px;
}

.produto img {
    width: 100%;
}

button {
    background: black;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Moda & Estilo</h1>

<div class="produtos">

    <div class="produto">
        <img src="https://via.placeholder.com/200">
        <h3>Camiseta</h3>
        <p>R$ 49,90</p>
        <button>Comprar</button>
    </div>

    <div class="produto">
        <img src="https://via.placeholder.com/200">
        <h3>Calça Jeans</h3>
        <p>R$ 99,90</p>
        <button>Comprar</button>
    </div>

</div>

</body>
</html>
